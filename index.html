// ============================================================================
// TocSheet — virtualized list, handles 10k+ chapters
// ============================================================================
const ROW_H = 44;
const TocSheet = ({ chapters, currentIdx, onPick, onClose }) => {
  const scrollRef = React.useRef(null);
  const [scrollTop, setScrollTop] = React.useState(0);
  const [containerH, setContainerH] = React.useState(480);

  React.useEffect(() => {
    if (!scrollRef.current) return;
    setContainerH(scrollRef.current.clientHeight);
    // Auto-center current chapter
    const target = Math.max(0, currentIdx * ROW_H - scrollRef.current.clientHeight / 2);
    scrollRef.current.scrollTop = target;
    setScrollTop(target);
  }, []);

  const totalH = chapters.length * ROW_H;
  const buffer = 6;
  const startIdx = Math.max(0, Math.floor(scrollTop / ROW_H) - buffer);
  const endIdx   = Math.min(chapters.length, Math.ceil((scrollTop + containerH) / ROW_H) + buffer);
  const visible = chapters.slice(startIdx, endIdx);

  return (
    <div onClick={onClose} style={{
      position: "absolute", inset: 0, zIndex: 12,
      background: "var(--scrim)",
      display: "flex", alignItems: "flex-end",
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        width: "100%", maxHeight: "85%",
        background: "var(--bg-elev)",
        borderTopLeftRadius: 28, borderTopRightRadius: 28,
        padding: "12px 0 16px",
        boxShadow: "0 -12px 32px rgba(28,24,18,.20)",
        display: "flex", flexDirection: "column",
        borderTop: "1px solid var(--gold)",
      }}>
        <div style={{
          width: 36, height: 4, borderRadius: 99,
          background: "var(--gold-grad)", margin: "0 auto 12px",
        }} />
        <div style={{
          padding: "0 22px 12px",
          display: "flex", alignItems: "baseline", justifyContent: "space-between",
        }}>
          <div className="gold-bold" style={{ fontSize: 22 }}>目录</div>
          <span className="t-ui-sm">{chapters.length.toLocaleString()} 章</span>
        </div>
        <div ref={scrollRef} onScroll={(e) => setScrollTop(e.currentTarget.scrollTop)} style={{
          flex: 1, overflowY: "auto", padding: "0 12px",
          WebkitOverflowScrolling: "touch",
        }}>
          {chapters.length === 0 ? (
            <div style={{ textAlign: "center", color: "var(--fg-faint)", padding: 40, fontStyle: "italic" }}>
              这本书没有可识别的章节
            </div>
          ) : (
            <div style={{ height: totalH, position: "relative" }}>
              {visible.map((c, j) => {
                const i = startIdx + j;
                const active = i === currentIdx;
                return (
                  <button
                    key={i}
                    onClick={() => { onPick(c, i); }}
                    style={{
                      position: "absolute", left: 0, right: 0, top: i * ROW_H, height: ROW_H,
                      display: "flex", alignItems: "center", gap: 12,
                      padding: "0 12px", border: 0, cursor: "pointer", textAlign: "left",
                      borderRadius: 10,
                      background: active ? "var(--gold-soft)" : "transparent",
                      borderLeft: `3px solid ${active ? "var(--gold)" : "transparent"}`,
                    }}
                  >
                    <span style={{
                      fontFamily: "var(--font-mono)", fontSize: 11,
                      color: active ? "var(--gold-strong)" : "var(--fg-faint)",
                      minWidth: 38, textAlign: "right",
                    }}>{i + 1}</span>
                    <span style={{
                      flex: 1, minWidth: 0,
                      fontFamily: "var(--font-serif)", fontSize: 14,
                      color: active ? "var(--gold-strong)" : "var(--fg)",
                      fontWeight: active ? 700 : 400,
                      whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                    }}>{c.title}</span>
                    {active && <Icon name="waveSm" size={14} color="var(--gold)" />}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// Patch AppBar to accept titleStyle (small helper override)
// We rely on the existing components.jsx AppBar; just re-expose a richer one here.

Object.assign(window, { LibraryScreen, NowPlayingScreen, VoicesScreen, AddFileSheet, SettingsScreen, TocSheet });
</script>
<script type="text/babel">/* HPM app · v0.7
   - Book TEXT stored in IndexedDB (large files no longer freeze localStorage)
   - Speed slider 0.5×→3.0× in 0.1 steps
   - Voice profiles try harder to map onto distinct system voiceURIs
   - Boundary fallback: when onboundary doesn't fire (Chinese TTS on Chrome),
     advance charIndex on a time-based estimator instead.
*/

const { useState, useEffect, useMemo, useRef } = React;

// ─── Sample books (seed only — full text kept in IndexedDB) ────────────────
const SAMPLE_SANTI = `第一章 · 科学边界

夜色渐深，他合上书页，窗外的城市灯火依旧明亮。
机器仍在朗读，声音温和地穿过房间，像是一段不被打扰的独白。

第二章 · 三体问题

三体问题，是天体力学中的经典难题：当三个天体在彼此引力的作用下运动时，它们的轨迹会变得极不规则——一种数学上的混沌。
任何一次细微的偏差，都会被无限放大，让长期预测变得几乎不可能。

第三章 · 日全食

他想起多年前在山顶看到的那次日全食。月亮缓缓覆盖太阳，光线一点点退去，世界陷入一种短暂的、近乎神圣的寂静。`;

const SAMPLE_HUOZHE = `第一章

我比现在年轻十岁的时候，获得了一个游手好闲的职业。

第二章

我喜欢喝农民那种带着苦味的茶水。`;

const SAMPLE_OLDMAN = `Chapter 1

He was an old man who fished alone in a skiff in the Gulf Stream.

Chapter 2

In the first forty days a boy had been with him.`;

const SAMPLE_NOTE = `灯下读书的人，并不孤独。

把一本书读完，就像走完一段陌生的路。`;

const SEED_META = [
  { id: "santi",  title: "三体",                    author: "刘慈欣",   palette: "amber", progress: 0, size: "1.2 MB", chapter: "—" },
  { id: "huozhe", title: "活着",                    author: "余华",     palette: "ink",   progress: 0, size: "640 KB", chapter: "—" },
  { id: "oldman", title: "The Old Man and the Sea", author: "Hemingway",palette: "teal",  progress: 0, size: "240 KB", chapter: "—" },
  { id: "yedu",   title: "夜读笔记",                author: "本地",     palette: "paper", progress: 0, size: "180 KB", chapter: "—" },
];
const SEED_TEXTS = {
  santi:  SAMPLE_SANTI, huozhe: SAMPLE_HUOZHE, oldman: SAMPLE_OLDMAN, yedu: SAMPLE_NOTE,
};

// ─── Voice profiles ────────────────────────────────────────────────────────
// `voiceHints`: substrings to look for in system Voice.name. We try each
// hint in order; the first match wins. Falls back to gender/pitch shaping
// when no system voice matches.
const VOICE_PROFILES = [
  { id: "sweetgirl", name: "甜美少女", glyph: "甜", lang: "zh-CN", gender: "female",
    pitch: 1.45, rateMul: 1.05, size: "18.4 MB", installed: true,
    voiceHints: ["xiaoyi", "xiaomeng", "xiaoshuang", "tingting", "甜", "蜜"],
    desc: "高音 · 轻快活泼 · 言情 / 校园 / 治愈" },
  { id: "energetic", name: "元气萝莉", glyph: "元", lang: "zh-CN", gender: "female",
    pitch: 1.65, rateMul: 1.20, size: "19.6 MB", installed: false,
    voiceHints: ["xiaorui", "xiaobei", "xiaomeng", "kid", "child"],
    desc: "更高音 · 节奏快 · 轻小说 / 喜剧 / 日常" },
  { id: "icegirl",   name: "清冷少女", glyph: "清", lang: "zh-CN", gender: "female",
    pitch: 1.15, rateMul: 0.90, size: "21.3 MB", installed: false,
    voiceHints: ["xiaohan", "xiaoqiu", "yaling", "ya-ling", "莹"],
    desc: "中高音 · 偏冷静 · 悬疑 / 古风 / 玄幻" },
  { id: "warmsis",   name: "温柔大姐姐", glyph: "柔", lang: "zh-CN", gender: "female",
    pitch: 1.00, rateMul: 0.85, size: "22.1 MB", installed: true,
    voiceHints: ["xiaoxiao", "samantha", "siri", "kyoko"],
    desc: "中音 · 慢而温暖 · 文学 / 散文 / 睡前故事" },
  { id: "mature",    name: "知性御姐", glyph: "御", lang: "zh-CN", gender: "female",
    pitch: 0.80, rateMul: 0.95, size: "24.7 MB", installed: false,
    voiceHints: ["meijia", "mei-jia", "fang", "huihui"],
    desc: "低音 · 沉稳 · 都市 / 职场 / 商战" },
  { id: "warmboy",   name: "暖男 · 低音", glyph: "暖", lang: "zh-CN", gender: "male",
    pitch: 0.85, rateMul: 0.95, size: "23.2 MB", installed: false,
    voiceHints: ["yunxi", "yunjian", "kangkang", "daniel"],
    desc: "低音 · 温暖 · 历史 / 武侠 / 悬疑" },
  { id: "aria",      name: "Aria · English",  glyph: "A", lang: "en-US", gender: "female",
    pitch: 1.0, rateMul: 1.0, size: "28.0 MB", installed: false, voiceHints: ["aria","jenny","samantha","karen","zira"],
    desc: "Natural English narrator" },
  { id: "natsu",     name: "夏 · 日本語",  glyph: "夏", lang: "ja-JP", gender: "female",
    pitch: 1.05, rateMul: 1.0, size: "21.0 MB", installed: false, voiceHints: ["kyoko","otoya","mizuki"],
    desc: "明るい · 日本語ナレーター" },
];

// Snap a stored numeric speed to a clean label
function speedLabel(x) {
  const n = Math.round(x * 10) / 10;
  if (Number.isInteger(n)) return n.toFixed(1) + "×";
  return n.toFixed(1) + "×";
}
window.SPEEDS = { "0.5×": 0.5, "1.0×": 1.0, "1.5×": 1.5, "2.0×": 2.0, "2.5×": 2.5, "3.0×": 3.0 };

// ─── App ───────────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useState("library");
  const [showAdd, setShowAdd] = useState(false);
  const [showToc, setShowToc] = useState(false);
  const [meta, setMeta]           = window.HpmStore.useStored("meta",      SEED_META);
  const [currentId, setCurrentId] = window.HpmStore.useStored("currentId", "santi");
  const [voiceId, setVoiceId]     = window.HpmStore.useStored("voiceId",   "sweetgirl");
  const [speedNum, setSpeedNum]   = window.HpmStore.useStored("speedNum",  1.0);
  const [theme, setTheme]         = window.HpmStore.useStored("theme",     "light");
  const [positions, setPositions] = window.HpmStore.useStored("positions", {});
  const [voices, setVoices]       = window.HpmStore.useStored("voices",    VOICE_PROFILES);

  const [bookText, setBookText] = useState("");
  const [textLoading, setTextLoading] = useState(false);
  const [seekBase, setSeekBase] = useState(0);
  const [ttsState, setTtsState] = useState({ ready: false, playing: false, paused: false, charIndex: 0 });
  const [chapters, setChapters] = useState([]);
  const [parsingChapters, setParsingChapters] = useState(false);

  const playing = ttsState.playing && !ttsState.paused;
  const tts = window.HpmTts;
  const ttsUnsupported = !tts || tts.unsupported;
  const voice = voices.find(v => v.id === voiceId && v.installed) || voices.find(v => v.installed) || voices[0];

  const bookMeta = meta.find(b => b.id === currentId) || meta[0];
  const book = bookMeta ? { ...bookMeta, text: bookText } : null;

  // Seed IndexedDB on first run
  useEffect(() => {
    (async () => {
      if (!window.HpmDB) return;
      const ids = await window.HpmDB.allIds();
      const have = new Set(ids);
      for (const [id, text] of Object.entries(SEED_TEXTS)) {
        if (!have.has(id)) await window.HpmDB.setText(id, text);
      }
    })();
  }, []);

  // Theme
  useEffect(() => {
    const html = document.documentElement;
    if (theme === "auto") html.removeAttribute("data-theme");
    else html.setAttribute("data-theme", theme);
  }, [theme]);

  // Load current book's text from IndexedDB whenever currentId changes
  useEffect(() => {
    let cancelled = false;
    setBookText(""); setChapters([]); setParsingChapters(true);
    setTextLoading(true);
    (async () => {
      const t = window.HpmDB ? await window.HpmDB.getText(currentId) : SEED_TEXTS[currentId];
      if (cancelled) return;
      const text = t || SEED_TEXTS[currentId] || "";
      setBookText(text);
      setTextLoading(false);
      // Async chapter parse
      if (window.HpmChapters) {
        window.HpmChapters.parseAsync(text).then(cs => {
          if (cancelled) return;
          setChapters(cs);
          setParsingChapters(false);
        });
      } else { setParsingChapters(false); }
    })();
    return () => { cancelled = true; };
  }, [currentId]);

  // Absolute char position (real if engine reports boundaries; estimated otherwise)
  const realCharIndex = seekBase + (ttsState.charIndex || 0);

  // ─── Time-based fallback for audio/text sync ──────────────────────────
  // Some Chinese TTS engines (Chromium on Android, Edge zh-CN) don't fire
  // 'onboundary' events. In that case ttsState.charIndex stays stuck. We
  // estimate position from elapsed wall time × characters-per-second.
  const startedAtRef = useRef(0);
  const baseAtStartRef = useRef(0);
  const [estimatedIdx, setEstimatedIdx] = useState(0);

  // Reset estimator anchors when playback starts or seekBase changes.
  useEffect(() => {
    if (ttsState.playing && !ttsState.paused) {
      startedAtRef.current = performance.now();
      baseAtStartRef.current = seekBase;
      setEstimatedIdx(seekBase);
    }
  }, [ttsState.playing, ttsState.paused, seekBase]);

  // Tick the estimator while playing
  useEffect(() => {
    if (!playing) return;
    const t = setInterval(() => {
      const elapsedSec = (performance.now() - startedAtRef.current) / 1000;
      // ~5 chars/sec at 1.0× for Chinese, ~12 for English. Use a single
      // ballpark — the highlight is approximate either way.
      const charsPerSec = 5.0 * (speedNum || 1) * (voice.rateMul || 1);
      const est = baseAtStartRef.current + Math.round(elapsedSec * charsPerSec);
      setEstimatedIdx(est);
    }, 150);
    return () => clearInterval(t);
  }, [playing, speedNum, voice.rateMul]);

  // Use whichever is further along: the real boundary or our estimator.
  // The boundary jumps fire at chunk starts in Chinese — by trusting the
  // max we keep the highlight moving smoothly between events.
  const charIndex = Math.max(realCharIndex, playing ? estimatedIdx : realCharIndex);
  const totalLen  = bookText.length;
  const boundedCharIndex = Math.max(0, Math.min(charIndex, totalLen));

  // Persist reading position per book
  useEffect(() => {
    if (!bookMeta || !bookText || boundedCharIndex <= 0) return;
    setPositions(prev => ({ ...prev, [bookMeta.id]: boundedCharIndex }));
  }, [boundedCharIndex, bookMeta && bookMeta.id]);

  const currentChapterIdx = useMemo(() => {
    if (!window.HpmChapters || !chapters.length) return 0;
    return window.HpmChapters.currentChapter(chapters, boundedCharIndex);
  }, [chapters, boundedCharIndex]);
  const currentChapter = chapters[currentChapterIdx];

  // Subscribe to TTS state
  useEffect(() => {
    if (ttsUnsupported) return;
    return tts.onState(s => setTtsState(s));
  }, []);

  // Voice / speed change → restart from current position if currently playing
  useEffect(() => {
    if (ttsUnsupported || !playing) return;
    speakFrom(boundedCharIndex);
    // eslint-disable-next-line
  }, [voiceId, speedNum]);

  const speakFrom = (absIdx) => {
    if (ttsUnsupported || !bookText) return;
    const start = Math.max(0, Math.min(absIdx, bookText.length));
    setSeekBase(start);
    tts.speak(bookText.slice(start), {
      lang: voice.lang, gender: voice.gender, pitch: voice.pitch,
      rate: (Number(speedNum) || 1.0) * (voice.rateMul || 1.0),
      voiceHints: voice.voiceHints,
    });
  };

  const onSeek = (absIdx) => speakFrom(absIdx);
  const onToggle = () => {
    if (ttsUnsupported || !bookText) return;
    if (playing) tts.pause();
    else if (ttsState.paused) tts.resume();
    else speakFrom(boundedCharIndex);
  };

  const pickBook = (id) => {
    if (id !== currentId) {
      if (!ttsUnsupported) tts.stop();
      setCurrentId(id);
      const saved = positions[id] || 0;
      setSeekBase(saved);
    }
    setRoute("playing");
  };

  const handleAdd = async (file) => {
    setShowAdd(false);
    const safeName = (file.name || "untitled").replace(/[\\/:*?"<>|]/g, "_");
    const id = safeName.replace(/\.txt$/i, "") || "book-" + Date.now();
    const text = file.text || "";

    try {
      // 1) Save text to IndexedDB FIRST (independently of React state)
      if (window.HpmDB) {
        await window.HpmDB.setText(id, text);
      }
    } catch (e) {
      console.error("save to IndexedDB failed", e);
      alert("保存到本地失败 · " + (e && e.message ? e.message : "未知错误"));
      return;
    }

    // 2) Build meta (small, safe for localStorage)
    const newMeta = {
      id, title: id.length > 60 ? id.slice(0, 60) + "…" : id,
      author: "本地", palette: "paper",
      progress: 0, size: file.size, chapter: "—",
      charset: file.charset || null,
    };

    // 3) Update meta list defensively
    try {
      const without = (meta || []).filter(b => b.id !== id);
      setMeta([newMeta, ...without]);
    } catch (e) {
      console.error("setMeta failed", e);
    }

    // 4) Switch to the new book — clear any in-flight TTS first
    try { if (!ttsUnsupported && tts) tts.stop(); } catch (_) {}
    setCurrentId(id);
    setSeekBase(0);
    setRoute("playing");
  };

  const onSaveEdit = async (newText) => {
    if (!bookMeta) return;
    if (!ttsUnsupported) tts.stop();
    if (window.HpmDB) await window.HpmDB.setText(bookMeta.id, newText);
    setBookText(newText);
    setSeekBase(0);
    setPositions(prev => ({ ...prev, [bookMeta.id]: 0 }));
    // Reparse chapters
    if (window.HpmChapters) {
      setParsingChapters(true);
      window.HpmChapters.parseAsync(newText).then(cs => {
        setChapters(cs); setParsingChapters(false);
      });
    }
  };

  const onExport = (b) => {
    if (!b || !bookText) return;
    try {
      const blob = new Blob([bookText], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = (b.title || "未命名") + ".txt";
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
    } catch (e) { console.error("export failed", e); }
  };

  const onClearAll = async () => {
    if (!confirm("确定清空全部数据？")) return;
    try {
      Object.keys(localStorage).forEach(k => { if (k.startsWith("hpm:")) localStorage.removeItem(k); });
      if (window.HpmDB) {
        const ids = await window.HpmDB.allIds();
        for (const id of ids) await window.HpmDB.deleteText(id);
      }
    } catch (_) {}
    location.reload();
  };

  return (
    <div style={{ position: "relative", width: "100%", height: "100%", overflow: "hidden", background: "var(--bg)" }}>
      {route === "library" && (
        <LibraryScreen
          books={meta}
          currentId={currentId}
          onPick={pickBook}
          onAdd={() => setShowAdd(true)}
          onOpenVoices={() => setRoute("voices")}
          onOpenSettings={() => setRoute("settings")}
        />
      )}
      {route === "playing" && book && (
        <NowPlayingScreen
          book={book}
          textLoading={textLoading}
          playing={playing}
          paused={ttsState.paused}
          onToggle={onToggle}
          onSeek={onSeek}
          onBack={() => setRoute("library")}
          onOpenVoices={() => setRoute("voices")}
          onOpenToc={() => setShowToc(true)}
          onSave={onSaveEdit}
          onExport={onExport}
          speedNum={Number(speedNum) || 1.0}
          setSpeedNum={(n) => setSpeedNum(Math.round(n * 10) / 10)}
          charIndex={boundedCharIndex}
          ttsUnsupported={ttsUnsupported}
          chapters={chapters}
          currentChapterIdx={currentChapterIdx}
          currentChapter={currentChapter}
          onJumpChapter={(c) => speakFrom(c.charStart)}
          voiceLabel={voice.name.split(" · ")[0]}
          parsingChapters={parsingChapters}
        />
      )}
      {route === "voices" && (
        <VoicesScreen
          voices={voices}
          currentVoice={voiceId}
          onPick={(id) => {
            const v = voices.find(x => x.id === id);
            if (!v || !v.installed) return;
            setVoiceId(id);
            setRoute(currentId ? "playing" : "library");
          }}
          onBack={() => setRoute(currentId ? "playing" : "library")}
          onDownload={(id) => {
            setVoices(vs => vs.map(v => v.id === id ? { ...v, downloading: 0.05 } : v));
            let p = 0.05;
            const t = setInterval(() => {
              p += 0.12;
              setVoices(vs => vs.map(v => v.id === id
                ? (p >= 1 ? { ...v, downloading: undefined, installed: true } : { ...v, downloading: p })
                : v));
              if (p >= 1) clearInterval(t);
            }, 350);
          }}
        />
      )}
      {route === "settings" && (
        <SettingsScreen
          onBack={() => setRoute("library")}
          theme={theme}
          setTheme={setTheme}
          voiceLabel={voice.name}
          onClearAll={onClearAll}
        />
      )}

      {route !== "playing" && bookMeta && (
        <PlaybackBar
          book={bookMeta}
          playing={playing}
          onToggle={onToggle}
          onOpen={() => setRoute("playing")}
        />
      )}

      {showAdd && <AddFileSheet onClose={() => setShowAdd(false)} onAdd={handleAdd} />}
      {showToc && (
        <TocSheet
          chapters={chapters}
          currentIdx={currentChapterIdx}
          onPick={(c) => { setShowToc(false); speakFrom(c.charStart); }}
          onClose={() => setShowToc(false)}
        />
      )}
    </div>
  );
}

window.App = App;
</script>
<script type="text/babel">ReactDOM.createRoot(document.getElementById("app")).render(<App />);</script>
