/* ============================================================
   HPM Design System · colors_and_type.css
   Tokens for color, type, spacing, radius, shadow, motion.
   Light + dark are both first-class.
   ============================================================ */

@import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500&display=swap");

:root {
  /* ---------- Color · light (paper) ---------- */
  --bg:          #F6F1E7;
  --bg-elev:     #FBF7EE;
  --bg-sunken:   #EFE8D8;
  --fg:          #1C1812;
  --fg-muted:    #6B6258;
  --fg-faint:    #9A9080;
  --accent:        #C8761E;  /* amber · playing / primary */
  --accent-strong: #A85F12;
  --accent-soft:   #F4E2C4;
  --secondary:        #3C7A82;  /* teal · network / links */
  --secondary-soft:   #DCEAEC;
  --danger:        #B23A3A;
  --danger-soft:   #F2D6D6;
  --rule:          #E5DCC8;
  --rule-strong:   #D4C7A8;
  --scrim:         rgba(28, 24, 18, 0.40);

  /* ---------- Type · families ---------- */
  --font-serif: "Source Serif 4", "Noto Serif SC", Georgia, "Songti SC", "Source Han Serif SC", serif;
  --font-sans:  "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", sans-serif;
  --font-mono:  "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* ---------- Type · scale (size / line-height) ---------- */
  --t-display-size: 48px;   --t-display-lh: 56px;
  --t-h1-size:      32px;   --t-h1-lh:      40px;
  --t-h2-size:      24px;   --t-h2-lh:      32px;
  --t-h3-size:      20px;   --t-h3-lh:      28px;
  --t-body-l-size:  18px;   --t-body-l-lh:  30px;
  --t-body-size:    16px;   --t-body-lh:    26px;
  --t-ui-size:      15px;   --t-ui-lh:      22px;
  --t-ui-sm-size:   13px;   --t-ui-sm-lh:   18px;
  --t-mono-size:    13px;   --t-mono-lh:    18px;

  /* ---------- Weights ---------- */
  --w-regular: 400;
  --w-medium:  500;
  --w-semi:    600;
  --w-bold:    700;

  /* ---------- Spacing · 8pt grid ---------- */
  --s-0:  0;
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  24px;
  --s-6:  32px;
  --s-7:  48px;
  --s-8:  64px;
  --s-9:  96px;
  --s-10: 128px;

  /* ---------- Radius ---------- */
  --r-sm:   10px;
  --r-md:   18px;
  --r-lg:   28px;
  --r-pill: 999px;

  /* ---------- Shadow / elevation ---------- */
  --shadow-1: 0 1px 2px rgba(28, 24, 18, 0.04), 0 2px 8px rgba(28, 24, 18, 0.06);
  --shadow-2: 0 4px 16px rgba(28, 24, 18, 0.10), 0 12px 32px rgba(28, 24, 18, 0.12);
  --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.6);

  /* ---------- Motion ---------- */
  --d-fast: 120ms;
  --d-base: 220ms;
  --d-slow: 360ms;
  --ease:   cubic-bezier(0.22, 0.61, 0.36, 1);    /* out */
  --ease-in: cubic-bezier(0.32, 0, 0.67, 0);      /* in (leaving) */

  /* ---------- Touch targets ---------- */
  --touch-min: 44px;
}

   Dark mode (ink)
   ============================================================ */

}

/* ============================================================
   Semantic element styles
   ============================================================ */
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: var(--t-body-size);
  line-height: var(--t-body-lh);

h1, .t-h1 {

}
h2, .t-h2 {
  font-family: var(--font-serif);
  font-size: var(--t-h2-size);
  line-height: var(--t-h2-lh);

}

  font-family: var(--font-sans);
  font-size: var(--t-h3-size);

}

a {

hr {

}

::selection { background: var(--accent-soft); color: var(--fg); }

/* ============================================================
   Component primitives
   ============================================================ */

/* Button */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s-2);
  height: 44px;
  padding: 0 var(--s-5);
  border-radius: var(--r-sm);
  border: 1px solid transparent;
  background: var(--bg-elev);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: var(--t-ui-size);
  font-weight: var(--w-medium);
  cursor: pointer;
  transition: transform var(--d-fast) var(--ease),
              background var(--d-fast) var(--ease),
              border-color var(--d-fast) var(--ease);
}
.btn:active { transform: scale(0.97); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.btn--primary {
  background: var(--accent);
  color: #FFF;
}
.btn--primary:hover { background: var(--accent-strong); }

.btn--ghost {
  background: transparent;
  border-color: var(--rule);
}
.btn--ghost:hover { background: var(--bg-elev); border-color: var(--rule-strong); }

.btn--icon {
  width: 44px;
  padding: 0;
  border-radius: var(--r-pill);
}

/* Card */
.card {
  background: var(--bg-elev);
  border-radius: var(--r-md);
  padding: var(--s-5);
  box-shadow: var(--shadow-1);
}
@media (prefers-color-scheme: dark) {
  .card { box-shadow: none; border: 1px solid var(--rule); }
}

/* Chip */
.chip {
  display: inline-flex;
  align-items: center;
  gap: var(--s-1);
  height: 28px;
  padding: 0 var(--s-3);
  border-radius: var(--r-pill);
  background: var(--bg-sunken);
  color: var(--fg-muted);
  font-family: var(--font-sans);
  font-size: var(--t-ui-sm-size);
  font-weight: var(--w-medium);
}
.chip--active { background: var(--accent-soft); color: var(--accent-strong); }

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>/* HpmReadTextFile · multi-encoding TXT reader for browsers.
 *
 * Works in every modern browser (Chrome, Firefox, Safari desktop + mobile,
 * Edge) using the built-in TextDecoder. No dependencies.
 *
 *   const result = await window.HpmReadTextFile(file);   // File from <input>
 *   if (result.ok) { result.text, result.charset, result.byteCount }
 *   else           { result.reason: 'too-large' | 'failed', ... }
 *
 * Auto-detected encodings (priority order):
 *   UTF-8 (with BOM)  →  UTF-16 LE/BE (with BOM)  →
 *   UTF-8 (strict)    →  GB18030 (= GBK ⊃ GB2312) →  BIG5 →  ISO-8859-1
 *
 * Line endings normalized to \n. Null bytes stripped.
 */
(function () {
  const MAX_BYTES = 64 * 1024 * 1024;    // 64 MB hard cap (covers very long novels)

  // Some Safari versions before 16.4 don't ship gb18030/big5. Guard with try.
  function isSupported(label) {
    try { new TextDecoder(label, { fatal: false }); return true; }
    catch (_) { return false; }
  }

  function bomCharset(b) {
    if (b.length >= 3 && b[0] === 0xEF && b[1] === 0xBB && b[2] === 0xBF) return 'utf-8';
    if (b.length >= 2 && b[0] === 0xFF && b[1] === 0xFE) return 'utf-16le';
    if (b.length >= 2 && b[0] === 0xFE && b[1] === 0xFF) return 'utf-16be';
    return null;
  }

  function strictDecodes(b, label) {
    try {
      new TextDecoder(label, { fatal: true }).decode(b);
      return true;
    } catch (_) { return false; }
  }

  function scoreCjk(b, label) {
    if (!isSupported(label)) return -Infinity;
    try {
      const sample = b.length > 32768 ? b.subarray(0, 32768) : b;
      const text = new TextDecoder(label, { fatal: false }).decode(sample);
      let hits = 0, bad = 0;
      for (let i = 0; i < text.length; i++) {
        const cp = text.charCodeAt(i);
        if      (cp === 0xFFFD)                  bad++;
        else if (cp >= 0x4E00 && cp <= 0x9FFF)   hits++;
        else if (cp >= 0x3400 && cp <= 0x4DBF)   hits++;
      }
      return hits - bad * 3;
    } catch (_) { return -Infinity; }
  }

  function detect(bytes) {
    const bom = bomCharset(bytes);
    if (bom) return bom;
    if (strictDecodes(bytes, 'utf-8')) return 'utf-8';
    const gb   = scoreCjk(bytes, 'gb18030');
    const big5 = scoreCjk(bytes, 'big5');
    if (gb   >= big5 && gb   > 0) return 'gb18030';
    if (big5 >  gb   && big5 > 0) return 'big5';
    // Last resort — never throws but may produce replacement chars.
    return isSupported('windows-1252') ? 'windows-1252' : 'iso-8859-1';
  }

  function stripBom(b, cs) {
    if (cs === 'utf-8' && b.length >= 3 &&
        b[0] === 0xEF && b[1] === 0xBB && b[2] === 0xBF) return b.subarray(3);
    if (cs === 'utf-16le' && b.length >= 2 &&
        b[0] === 0xFF && b[1] === 0xFE) return b.subarray(2);
    if (cs === 'utf-16be' && b.length >= 2 &&
        b[0] === 0xFE && b[1] === 0xFF) return b.subarray(2);
    return b;
  }

  async function read(file) {
    if (!file || file.size === 0) {
      return { ok: false, reason: 'empty' };
    }
    if (file.size > MAX_BYTES) {
      return { ok: false, reason: 'too-large', byteCount: file.size };
    }
    try {
      // Use Blob.arrayBuffer if available; fall back to FileReader for old WebViews
      let buf;
      if (file.arrayBuffer) {
        buf = await file.arrayBuffer();
      } else {
        buf = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload  = () => res(r.result);
          r.onerror = () => rej(r.error || new Error("read failed"));
          r.readAsArrayBuffer(file);
        });
      }
      const bytes = new Uint8Array(buf);
      const cs    = detect(bytes);
      const dec   = new TextDecoder(cs, { fatal: false });
      let text    = dec.decode(stripBom(bytes, cs));
      text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\u0000/g, '');
      return { ok: true, text, charset: cs.toUpperCase(), byteCount: bytes.length };
    } catch (e) {
      return { ok: false, reason: 'failed', error: String(e && e.message || e) };
    }
  }

  function formatSize(b) {
    if (b < 1024)        return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  }

  window.HpmReadTextFile = read;
  window.HpmReadTextFile.formatSize = formatSize;
  window.HpmReadTextFile.MAX_BYTES  = MAX_BYTES;
})();
</script>
<script>/* HpmChapters · parse chapter table of contents from plain TXT.
 *
 * Returns: [{ title, charStart }, ...] including a synthetic "正文 / Prologue"
 * entry at index 0 if there's text before the first heading.
 *
 * Recognizes (line-anchored):
 *   第X章 / 第X节 / 第X回 / 第X卷 / 第X篇 / 第X部 / 第X集
 *   楔子 · 序章 · 序言 · 前言 · 引子 · 尾声 · 后记
 *   Chapter N / CHAPTER N / Ch. N / Part N / Book N
 *   Roman numerals at start of line
 *
 * For very long books (1MB+ text) parsing happens in chunks so the UI
 * stays responsive. Use `parseAsync` for non-blocking parsing.
 */
(function () {
  const CN_NUM = "[一二三四五六七八九十百千万零两\\d]+";
  const CN_HEAD = new RegExp("^[\\s\\u3000]*第" + CN_NUM + "[章节回卷篇部集][\\s\\S]{0,60}$");
  const CN_PREAMBLE = /^[\s\u3000]*(楔子|序章|序言|序|前言|引子|尾声|后记|附录|目录|致谢)[\s\S]{0,60}$/;
  const EN_HEAD = /^[\s]*(chapter|ch\.|part|book)\s*[ivxlcdm\d]+[\s\S]{0,80}$/i;
  const ROMAN_HEAD = /^[\s]*[IVXLCDM]{1,6}\.?\s*$/;

  function isHeading(line) {
    if (!line) return false;
    const trimmed = line.trim();
    if (trimmed.length === 0 || trimmed.length > 80) return false;
    return CN_HEAD.test(trimmed) || CN_PREAMBLE.test(trimmed) ||
           EN_HEAD.test(trimmed) || ROMAN_HEAD.test(trimmed);
  }

  // Synchronous parser — fine for files under ~2 MB.
  function parse(text) {
    if (!text) return [{ title: "正文", charStart: 0 }];
    const chapters = [];
    let pos = 0;
    const lines = text.split("\n");
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (isHeading(line)) chapters.push({ title: line.trim(), charStart: pos });
      pos += line.length + 1;
    }
    if (chapters.length === 0) return [{ title: "正文", charStart: 0 }];
    if (chapters[0].charStart > 80) chapters.unshift({ title: "开头", charStart: 0 });
    return chapters;
  }

  // Max bytes per pageable "chapter". If a real chapter is bigger we split it
  // into sub-pages so the reader stays responsive even for one-chapter 12MB
  // novels. ~20 000 chars ≈ ~50 KB UTF-8 ≈ a comfortable 6-page chapter.
  const MAX_CHAPTER_LEN = 20000;

  // Async chunked parser — keeps UI responsive on huge files.
  // Returns a promise that resolves to the same shape.
  // Calls onProgress(0..1) periodically if provided.
  function parseAsync(text, onProgress) {
    return new Promise((resolve) => {
      if (!text) { resolve([{ title: "正文", charStart: 0 }]); return; }
      const raw = [];
      let pos = 0;
      let lineIdx = 0;
      const lines = text.split("\n");
      const total = lines.length;
      const CHUNK = 4000;

      function step() {
        const start = lineIdx;
        const end = Math.min(total, start + CHUNK);
        for (let i = start; i < end; i++) {
          const line = lines[i];
          if (isHeading(line)) raw.push({ title: line.trim(), charStart: pos });
          pos += line.length + 1;
        }
        lineIdx = end;
        if (onProgress) try { onProgress(end / total); } catch (_) {}
        if (lineIdx < total) {
          if (window.requestIdleCallback) window.requestIdleCallback(step, { timeout: 50 });
          else setTimeout(step, 0);
        } else {
          finishParse(raw, text, resolve);
        }
      }
      step();
    });
  }

  function finishParse(raw, text, resolve) {
    if (raw.length === 0) raw.push({ title: "正文", charStart: 0 });
    else if (raw[0].charStart > 80) raw.unshift({ title: "开头", charStart: 0 });

    // Now split any chapter longer than MAX_CHAPTER_LEN into sub-pages,
    // breaking on paragraph boundaries.
    const out = [];
    for (let i = 0; i < raw.length; i++) {
      const ch = raw[i];
      const endAbs = i + 1 < raw.length ? raw[i + 1].charStart : text.length;
      const len = endAbs - ch.charStart;
      if (len <= MAX_CHAPTER_LEN) {
        out.push(ch);
      } else {
        const pages = Math.ceil(len / MAX_CHAPTER_LEN);
        // Pick split points at the nearest "\n" after each ideal boundary
        let cursor = ch.charStart;
        for (let p = 0; p < pages; p++) {
          const idealEnd = Math.min(endAbs, ch.charStart + (p + 1) * MAX_CHAPTER_LEN);
          let split;
          if (p === pages - 1) {
            split = endAbs;
          } else {
            // search forward for a paragraph break
            split = text.indexOf("\n", idealEnd);
            if (split === -1 || split > idealEnd + 2000) split = idealEnd;
            else split++;        // include the \n in the previous page
          }
          out.push({
            title: pages > 1 ? `${ch.title} · ${p + 1}/${pages}` : ch.title,
            charStart: cursor,
            virtual: p > 0,        // mark synthetic sub-pages
          });
          cursor = split;
        }
      }
    }
    resolve(out);
  }

  function currentChapter(chapters, charIndex) {
    if (!chapters || !chapters.length) return -1;
    let lo = 0, hi = chapters.length - 1, ans = 0;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (chapters[mid].charStart <= charIndex) { ans = mid; lo = mid + 1; }
      else hi = mid - 1;
    }
    return ans;
  }

  /** End-char of chapter [i] (exclusive). For chapter slicing. */
  function chapterEnd(chapters, i, totalLen) {
    return i + 1 < chapters.length ? chapters[i + 1].charStart : totalLen;
  }

  window.HpmChapters = { parse, parseAsync, currentChapter, chapterEnd, isHeading };
})();
</script>
<script>/* HpmStore · tiny typed localStorage wrapper.
 *
 *   HpmStore.get('voiceId', 'sweetgirl')   // value | default
 *   HpmStore.set('voiceId', 'aria')
 *   HpmStore.useStored('voiceId', 'sweetgirl')  -> [value, setValue]  (React hook)
 *
 * Keys are namespaced under "hpm:" so they don't collide.
 */
(function () {
  const NS = "hpm:";
  function get(key, fallback) {
    try {
      const raw = localStorage.getItem(NS + key);
      if (raw == null) return fallback;
      return JSON.parse(raw);
    } catch (_) { return fallback; }
  }
  function set(key, val) {
    try {
      if (val === undefined) localStorage.removeItem(NS + key);
      else localStorage.setItem(NS + key, JSON.stringify(val));
    } catch (_) {}
  }
  function useStored(key, fallback) {
    const [v, setV] = React.useState(() => get(key, fallback));
    React.useEffect(() => { set(key, v); }, [v]);
    return [v, setV];
  }
  window.HpmStore = { get, set, useStored };
})();
</script>
<script>/* HpmDB · IndexedDB-backed book text store.
 *
 * Why: localStorage has a 5–10 MB quota per origin, and storing a 12 MB book
 * in it either throws or freezes the tab when serializing. IndexedDB is the
 * right home for the big strings. Metadata (title, palette, progress) stays
 * in localStorage via HpmStore so the library list is instant.
 *
 *   await HpmDB.setText(bookId, fullText)
 *   await HpmDB.getText(bookId)           -> string | null
 *   await HpmDB.deleteText(bookId)
 *   await HpmDB.allIds()                  -> string[]
 */
(function () {
  const DB_NAME = "hpm";
  const DB_VER  = 1;
  const STORE   = "texts";

  let _db = null;
  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise((resolve, reject) => {
      if (!window.indexedDB) return reject(new Error("indexedDB unsupported"));
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      };
      req.onsuccess = () => { _db = req.result; resolve(_db); };
      req.onerror = () => reject(req.error);
    });
  }

  function tx(mode, fn) {
    return open().then(db => new Promise((resolve, reject) => {
      const t = db.transaction(STORE, mode);
      const s = t.objectStore(STORE);
      let result;
      Promise.resolve(fn(s, (r) => { result = r; })).catch(reject);
      t.oncomplete = () => resolve(result);
      t.onerror    = () => reject(t.error);
      t.onabort    = () => reject(t.error);
    }));
  }

  async function setText(id, text) {
    return tx("readwrite", (s) => { s.put(text, id); });
  }
  async function getText(id) {
    return tx("readonly", (s, ret) => new Promise((res) => {
      const r = s.get(id);
      r.onsuccess = () => { ret(r.result == null ? null : r.result); res(); };
      r.onerror   = () => { ret(null); res(); };
    }));
  }
  async function deleteText(id) {
    return tx("readwrite", (s) => { s.delete(id); });
  }
  async function allIds() {
    return tx("readonly", (s, ret) => new Promise((res) => {
      const r = s.getAllKeys();
      r.onsuccess = () => { ret(Array.from(r.result || [])); res(); };
      r.onerror   = () => { ret([]); res(); };
    }));
  }

  window.HpmDB = { setText, getText, deleteText, allIds };
})();
</script>
<script>/* HpmFetchUrl · pull a remote TXT file into HPM.
 *
 *   await HpmFetchUrl(url) -> { ok: true, text, charset, byteCount, name }
 *                          | { ok: false, reason: 'cors'|'http'|'too-large'|'failed', error }
 *
 * Tries the URL directly first; if CORS blocks it, retries via a public CORS
 * proxy. Falls through the same multi-encoding decoder as the local file
 * uploader, so GBK / BIG5 / UTF-16 TXT all work.
 */
(function () {
  const MAX_BYTES = 64 * 1024 * 1024;

  // Public CORS proxies (round-robin)
  const PROXIES = [
    (u) => "https://corsproxy.io/?" + encodeURIComponent(u),
    (u) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  ];

  // Smart URL transform — convert common share links to direct-download URLs
  function normalize(url) {
    try {
      const u = new URL(url.trim());
      // GitHub blob → raw
      if (u.hostname === "github.com" && u.pathname.includes("/blob/")) {
        return "https://raw.githubusercontent.com" +
               u.pathname.replace("/blob/", "/");
      }
      // Gist → raw
      if (u.hostname === "gist.github.com" && !u.pathname.endsWith("/raw")) {
        return url + "/raw";
      }
      // Dropbox: dl=0 → raw=1
      if (u.hostname.endsWith("dropbox.com")) {
        u.searchParams.set("raw", "1");
        u.searchParams.delete("dl");
        return u.toString();
      }
      return url;
    } catch (_) { return url; }
  }

  function inferName(url) {
    try {
      const u = new URL(url);
      const parts = u.pathname.split("/");
      const last = parts[parts.length - 1] || "remote";
      return decodeURIComponent(last) || "remote.txt";
    } catch (_) { return "remote.txt"; }
  }

  // Same encoding-detection routine as text-file-reader.js
  function detectAndDecode(bytes) {
    if (bytes.length >= 3 && bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF)
      return decode(bytes.subarray(3), "utf-8");
    if (bytes.length >= 2 && bytes[0] === 0xFF && bytes[1] === 0xFE)
      return decode(bytes.subarray(2), "utf-16le");
    if (bytes.length >= 2 && bytes[0] === 0xFE && bytes[1] === 0xFF)
      return decode(bytes.subarray(2), "utf-16be");
    try {
      new TextDecoder("utf-8", { fatal: true }).decode(bytes);
      return decode(bytes, "utf-8");
    } catch (_) {}
    const gb   = score(bytes, "gb18030");
    const big5 = score(bytes, "big5");
    if (gb   >= big5 && gb   > 0) return decode(bytes, "gb18030");
    if (big5 >  gb   && big5 > 0) return decode(bytes, "big5");
    return decode(bytes, "windows-1252");
  }
  function decode(bytes, cs) {
    const text = new TextDecoder(cs, { fatal: false }).decode(bytes)
      .replace(/\r\n/g, "\n").replace(/\r/g, "\n").replace(/\u0000/g, "");
    return { text, charset: cs.toUpperCase() };
  }
  function score(bytes, cs) {
    try {
      const sample = bytes.length > 32768 ? bytes.subarray(0, 32768) : bytes;
      const t = new TextDecoder(cs, { fatal: false }).decode(sample);
      let hits = 0, bad = 0;
      for (let i = 0; i < t.length; i++) {
        const cp = t.charCodeAt(i);
        if      (cp === 0xFFFD)                bad++;
        else if (cp >= 0x4E00 && cp <= 0x9FFF) hits++;
        else if (cp >= 0x3400 && cp <= 0x4DBF) hits++;
      }
      return hits - bad * 3;
    } catch (_) { return 0; }
  }

  async function tryFetch(url) {
    const res = await fetch(url, { redirect: "follow" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const cl = res.headers.get("content-length");
    if (cl && parseInt(cl, 10) > MAX_BYTES) {
      const err = new Error("too-large");
      err.byteCount = parseInt(cl, 10);
      throw err;
    }
    const buf = await res.arrayBuffer();
    if (buf.byteLength > MAX_BYTES) {
      const err = new Error("too-large");
      err.byteCount = buf.byteLength;
      throw err;
    }
    return new Uint8Array(buf);
  }

  async function fetchUrl(rawUrl) {
    const url = normalize(rawUrl);
    let bytes = null;
    let lastError = null;
    // 1. Direct
    try { bytes = await tryFetch(url); }
    catch (e) { lastError = e; }
    // 2. Proxies
    if (!bytes) {
      for (const proxy of PROXIES) {
        try { bytes = await tryFetch(proxy(url)); if (bytes) break; }
        catch (e) { lastError = e; }
      }
    }
    if (!bytes) {
      if (lastError && lastError.message === "too-large") {
        return { ok: false, reason: "too-large", byteCount: lastError.byteCount };
      }
      return { ok: false, reason: "cors", error: lastError && lastError.message };
    }
    try {
      const { text, charset } = detectAndDecode(bytes);
      return {
        ok: true, text, charset,
        byteCount: bytes.length,
        name: inferName(url),
      };
    } catch (e) {
      return { ok: false, reason: "failed", error: String(e) };
    }
  }

  fetchUrl.normalize = normalize;
  fetchUrl.inferName = inferName;
  window.HpmFetchUrl = fetchUrl;
})();
</script>
<script>/* HpmTts · robust Web Speech wrapper.
 *
 *   const tts = window.HpmTts;
 *   tts.onState(fn) -> unsubscribe
 *   tts.speak(text, {lang, gender, voiceURI, rate, pitch, onEnd})
 *   tts.pause() / tts.resume() / tts.stop()
 *   tts.setRate(r)
 *
 * Robustness:
 *   • Chunks long text at sentence boundaries (max 180 chars).
 *   • Drives the queue manually — speaks ONE chunk at a time, advances on
 *     'end'. No queue-stall bug from `synth.speak()` flooding.
 *   • Watchdog: if `state.playing` is true but the engine is silent AND
 *     not paused for >1.5s, auto-resume from the current char index.
 *   • Mobile-keepalive: brief pause+resume every 8s only while playing,
 *     to defeat Chrome's idle timeout. Stops touching the engine when idle.
 *   • Resume is idempotent — clicking play after a freeze restarts the
 *     queue from the last known character index.
 */
(function () {
  // ─── Native TTS bridges (preferred when running inside an APK) ─────────
  // Order: Capacitor plugin → median.co bridge → window.speechSynthesis.
  const cap = window.Capacitor;
  const capTts = cap && cap.Plugins && cap.Plugins.TextToSpeech;

  // median.co exposes window.median or window.gonative depending on version.
  // The TTS feature ships under the "Text to Speech" add-on; if enabled, the
  // bridge function below is reachable.
  const median = window.median || window.gonative;
  const medianTts = median && (median.tts || (median.run && {
    speak: (o) => median.run({ command: "tts.speak", data: o }),
    stop:  ()  => median.run({ command: "tts.stop" }),
  }));

  const NATIVE = !!capTts;
  const MEDIAN = !NATIVE && !!medianTts;
  const synth = (NATIVE || MEDIAN) ? null : window.speechSynthesis;

  if (!NATIVE && !MEDIAN && !synth) {
    // Even without TTS we still want HpmTts to exist so the UI doesn't crash.
    // We expose a `unsupported: true` stub; the app's UI shows a clear error.
    window.HpmTts = {
      unsupported: true,
      onState: (fn) => { fn({ ready: false, playing: false, paused: false }); return () => {}; },
      speak: () => {}, pause: () => {}, resume: () => {}, stop: () => {}, setRate: () => {},
      voices: () => [], ready: () => Promise.resolve([]),
      state: { ready: false, playing: false, paused: false },
    };
    return;
  }

  const listeners = new Set();
  let state = {
    ready: false, playing: false, paused: false,
    voice: null, rate: 1.0, pitch: 1.0,
    charIndex: 0, totalChars: 0,
  };
  const emit = () => { for (const fn of listeners) { try { fn(state); } catch (_) {} } };

  // ─── Voice readiness ────
  let readyResolve;
  const readyP = new Promise(r => { readyResolve = r; });
  function refreshVoices() {
    if (NATIVE) {
      // Native is ready as soon as plugin is reachable
      state = { ...state, ready: true };
      readyResolve([]); emit();
      return;
    }
    const vs = synth.getVoices();
    if (vs.length && !state.ready) {
      state = { ...state, ready: true };
      readyResolve(vs); emit();
    }
  }
  refreshVoices();
  if (!NATIVE) synth.onvoiceschanged = refreshVoices;

  // ---- Chunking ----
  const IS_MOBILE = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent || "");
  const MAX_CHUNK = IS_MOBILE ? 120 : 180;

  function chunkText(text, maxLen = MAX_CHUNK) {
    const out = [];
    const sentences = text.match(/[^。！？!?\.\n]+[。！？!?\.\n]?/g) || [text];
    let buf = "";
    for (const s of sentences) {
      if ((buf + s).length > maxLen && buf) { out.push(buf); buf = ""; }
      if (s.length > maxLen) {
        for (let i = 0; i < s.length; i += maxLen) out.push(s.slice(i, i + maxLen));
      } else { buf += s; }
    }
    if (buf) out.push(buf);
    return out.filter(s => s.trim().length);
  }

  // ---- Voice picking ----
  const VOICE_RE_FEMALE = /(female|woman|girl|xiaoxiao|xiaoyi|xiaomeng|xiaohan|xiaomo|xiaoqiu|xiaoxuan|xiaorui|aria|jenny|zira|samantha|karen|tessa|tingting|sin-?ji|mei-?jia|ya-?ling|kyoko|mizuki|fiona|fang|xiaobei|晓|薇|婷|莹|妍|甜|蜜|柔|雪|月)/i;
  const VOICE_RE_MALE   = /(male|\bman\b|boy|yunxi|yunjian|yunyang|yunfeng|yunhao|kangkang|guy|david|alex|daniel|fred|tom|leo|刚|强|健|希|杰)/i;

  // Pick a voice trying, in order:
  //   1) explicit voiceURI
  //   2) any hint string in `voiceHints` (substring, case-insensitive)
  //   3) gender heuristic on name
  //   4) default voice in the language pool
  function pickVoice(lang, voiceURI, gender, voiceHints) {
    const vs = synth.getVoices();
    if (voiceURI) { const v = vs.find(x => x.voiceURI === voiceURI); if (v) return v; }
    const exact   = vs.filter(x => x.lang && x.lang.toLowerCase() === lang.toLowerCase());
    const prefix  = lang.split("-")[0].toLowerCase();
    const partial = vs.filter(x => x.lang && x.lang.toLowerCase().startsWith(prefix));
    const pool = exact.length ? exact : (partial.length ? partial : vs);
    if (voiceHints && voiceHints.length) {
      for (const hint of voiceHints) {
        if (!hint) continue;
        const re = new RegExp(hint, "i");
        const match = pool.find(v => re.test(v.name) || re.test(v.voiceURI || ""));
        if (match) return match;
      }
    }
    if (gender) {
      const re = gender === "female" ? VOICE_RE_FEMALE : VOICE_RE_MALE;
      const matched = pool.find(v => re.test(v.name));
      if (matched) return matched;
    }
    return pool.find(x => x.default) || pool[0] || null;
  }

  function detectLang(text) {
    const sample = text.slice(0, 200);
    const han   = (sample.match(/[\u4E00-\u9FFF\u3400-\u4DBF]/g) || []).length;
    const hira  = (sample.match(/[\u3040-\u309F\u30A0-\u30FF]/g) || []).length;
    const latin = (sample.match(/[A-Za-z]/g) || []).length;
    if (hira > 5) return "ja-JP";
    if (han > latin) return "zh-CN";
    return "en-US";
  }

  // ---- Playback engine (drives one chunk at a time) ----
  let session = null;     // {chunks, idx, baseChar, opts, voice, rate, pitch, onEnd}
  let watchdog = null;
  let keepalive = null;

  function clearTimers() {
    if (watchdog)  { clearInterval(watchdog);  watchdog  = null; }
    if (keepalive) { clearInterval(keepalive); keepalive = null; }
  }

  function startTimers() {
    clearTimers();
    // Watchdog: if we think we're playing but the engine has gone silent
    // (no .speaking, not .paused), retry the CURRENT chunk first; only skip
    // forward as a last resort.
    let silentSince = 0;
    let retried = false;
    watchdog = setInterval(() => {
      if (!session || state.paused) { silentSince = 0; retried = false; return; }
      if (synth.speaking || synth.pending) { silentSince = 0; retried = false; return; }
      silentSince += 500;
      if (silentSince >= 2500) {
        silentSince = 0;
        if (!retried) {
          // First recovery: re-speak the current chunk
          retried = true;
          speakCurrentChunk();
        } else if (session.idx < session.chunks.length - 1) {
          // Second recovery: advance and try the next one
          retried = false;
          session.idx++;
          speakCurrentChunk();
        } else {
          finish();
        }
      }
    }, 500);
    // Desktop-only keepalive. On mobile the pause+resume trick actually
    // BREAKS playback in several Chinese-system Chromiums, so we skip it.
    if (!IS_MOBILE) {
      keepalive = setInterval(() => {
        if (!session || state.paused) return;
        if (synth.speaking && !synth.paused) {
          try { synth.pause(); synth.resume(); } catch (_) {}
        }
      }, 8000);
    }
  }

  function speakCurrentChunk() {
    if (!session) return;
    const { chunks, idx, voice, rate, pitch, opts } = session;
    if (idx >= chunks.length) { finish(); return; }
    // Always cancel before speaking to avoid queue interleave
    try { synth.cancel(); } catch (_) {}

    const text = chunks[idx];
    const u = new SpeechSynthesisUtterance(text);
    if (voice) u.voice = voice;
    u.lang = (voice && voice.lang) || (opts.lang || "zh-CN");
    u.rate = rate;
    u.pitch = pitch;
    u.volume = 1;

    const chunkBase = session.baseChar + chunkOffset(chunks, idx);

    u.onstart = () => {
      state = { ...state, playing: true, paused: false };
      emit();
    };
    u.onboundary = (e) => {
      state = { ...state, charIndex: chunkBase + (e.charIndex || 0) };
      emit();
    };
    u.onend = () => {
      // Advance to next chunk
      if (!session) return;
      state = { ...state, charIndex: chunkBase + text.length };
      emit();
      session.idx++;
      if (session.idx < session.chunks.length) {
        // Tiny delay helps mobile Safari keep going reliably
        setTimeout(() => speakCurrentChunk(), 30);
      } else {
        finish();
      }
    };
    u.onerror = (e) => {
      // 'interrupted' / 'canceled' are normal during seek; ignore
      if (e && (e.error === "interrupted" || e.error === "canceled")) return;
      // Try to advance past a bad chunk
      if (session) {
        session.idx++;
        if (session.idx < session.chunks.length) { speakCurrentChunk(); return; }
      }
      finish();
    };

    try { synth.speak(u); }
    catch (e) { setTimeout(() => speakCurrentChunk(), 100); }
  }

  function chunkOffset(chunks, idx) {
    let off = 0;
    for (let i = 0; i < idx; i++) off += chunks[i].length;
    return off;
  }

  function finish() {
    const wasOnEnd = session && session.opts && session.opts.onEnd;
    session = null;
    clearTimers();
    state = { ...state, playing: false, paused: false };
    emit();
    if (wasOnEnd) try { wasOnEnd(); } catch (_) {}
  }

  // ---- Public API ----
  let wakeLock = null;
  async function acquireWakeLock() {
    try {
      if (navigator.wakeLock && !wakeLock) {
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => { wakeLock = null; });
      }
    } catch (_) {}
  }
  function releaseWakeLock() {
    try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (_) {}
  }
  // Re-grab wake lock + kick the engine if it stalled while the page was hidden
  document.addEventListener("visibilitychange", () => {
    if (NATIVE) return;
    if (document.visibilityState === "visible" && session && !state.paused) {
      acquireWakeLock();
      if (!synth.speaking && !synth.pending) {
        setTimeout(() => { if (session && !state.paused) speakCurrentChunk(); }, 200);
      }
    }
  });

  function speak(text, opts = {}) {
    if (NATIVE) return nativeSpeak(text, opts);
    if (MEDIAN) return medianSpeak(text, opts);
    stop();
    if (!text || !text.trim()) return;
    const lang = opts.lang || detectLang(text);
    const voice = pickVoice(lang, opts.voiceURI, opts.gender, opts.voiceHints);
    const rate  = clampRate(opts.rate || state.rate || 1.0);
    const pitch = opts.pitch == null ? 1.0 : opts.pitch;
    const chunks = chunkText(text);
    session = {
      chunks, idx: 0, baseChar: opts.baseChar || 0,
      voice, rate, pitch, opts,
    };
    state = {
      ...state, voice, rate, pitch,
      totalChars: text.length, charIndex: opts.baseChar || 0,
      playing: true, paused: false,
    };
    emit();
    startTimers();
    acquireWakeLock();
    speakCurrentChunk();
  }

  function pause() {
    if (NATIVE) return nativePause();
    if (MEDIAN) return medianPause();
    if (!session) return;
    try { synth.pause(); } catch (_) {}
    state = { ...state, playing: false, paused: true };
    emit();
  }
  function resume() {
    if (NATIVE) return nativeResume();
    if (MEDIAN) return medianResume();
    if (state.paused && session) {
      try { synth.resume(); } catch (_) {}
      // Some browsers don't actually resume after a long pause — if not
      // speaking within 400ms, re-speak from current chunk.
      const idx = session.idx;
      setTimeout(() => {
        if (!session) return;
        if (!synth.speaking) { session.idx = idx; speakCurrentChunk(); }
      }, 400);
      state = { ...state, playing: true, paused: false };
      emit();
      return;
    }
    // Hard resume after a freeze: nothing pending, but we know charIndex.
    // Caller (app) should call speak() with the remainder; we only handle
    // the simple resume here.
  }
  function stop() {
    if (NATIVE) return nativeStop();
    if (MEDIAN) return medianStop();
    session = null;
    clearTimers();
    releaseWakeLock();
    try { synth.cancel(); } catch (_) {}
    state = { ...state, playing: false, paused: false };
    emit();
  }
  // ─── Native Android TTS path (Capacitor + @capacitor-community/text-to-speech) ──
  // Speaks one chunk at a time, watching for completion via the plugin's
  // promise resolution. Uses an estimator for char-progress (the plugin
  // doesn't fire word boundaries on Android).
  let nativeSession = null;
  async function nativeSpeak(text, opts = {}) {
    nativeStop();
    if (!text || !text.trim()) return;
    const rate  = clampRate(opts.rate || state.rate || 1.0);
    const pitch = opts.pitch == null ? 1.0 : opts.pitch;
    const lang  = opts.lang || "zh-CN";
    const chunks = chunkText(text, 200);
    nativeSession = { chunks, idx: 0, lang, rate, pitch, opts, cancelled: false };
    state = {
      ...state, rate, pitch, voice: { name: "native-" + lang, lang },
      totalChars: text.length, charIndex: opts.baseChar || 0,
      playing: true, paused: false,
    };
    emit();
    acquireWakeLock();
    await nativeSpeakNext();
  }
  async function nativeSpeakNext() {
    if (!nativeSession || nativeSession.cancelled) return;
    const s = nativeSession;
    if (s.idx >= s.chunks.length) { finishNative(); return; }
    const text = s.chunks[s.idx];
    try {
      await capTts.speak({
        text, lang: s.lang, rate: s.rate, pitch: s.pitch, volume: 1.0,
        category: "playback",
      });
    } catch (e) {
      if (e && /interrupt|cancel/i.test(String(e.message || ""))) return;
    }
    if (!nativeSession || nativeSession.cancelled) return;
    // Advance char counter to the start of next chunk
    const startOfNext = chunkOffset(s.chunks, s.idx + 1);
    state = { ...state, charIndex: (s.opts.baseChar || 0) + startOfNext };
    emit();
    s.idx++;
    setTimeout(nativeSpeakNext, 30);
  }
  async function nativePause() {
    if (!nativeSession) return;
    try { await capTts.stop(); } catch (_) {}
    state = { ...state, playing: false, paused: true };
    emit();
  }
  async function nativeResume() {
    if (!nativeSession || !state.paused) return;
    state = { ...state, playing: true, paused: false };
    emit();
    nativeSpeakNext();
  }
  async function nativeStop() {
    if (nativeSession) nativeSession.cancelled = true;
    nativeSession = null;
    try { if (capTts) await capTts.stop(); } catch (_) {}
    releaseWakeLock();
    state = { ...state, playing: false, paused: false };
    emit();
  }
  function finishNative() {
    nativeSession = null;
    releaseWakeLock();
    state = { ...state, playing: false, paused: false };
    emit();
  }

  // ─── median.co bridge path ─────────────────────────────────────────────
  // median.co's TTS add-on exposes `median.tts.speak({text, lang, rate, pitch})`
  // and `median.tts.stop()`. It doesn't fire completion events reliably, so
  // we chunk and re-call after a time-based estimate.
  let medianSession = null;
  let medianTimer = null;
  async function medianSpeak(text, opts = {}) {
    medianStop();
    if (!text || !text.trim()) return;
    const rate  = clampRate(opts.rate || state.rate || 1.0);
    const pitch = opts.pitch == null ? 1.0 : opts.pitch;
    const lang  = opts.lang || "zh-CN";
    const chunks = chunkText(text, 180);
    medianSession = { chunks, idx: 0, lang, rate, pitch, opts, cancelled: false };
    state = {
      ...state, rate, pitch, voice: { name: "median-" + lang, lang },
      totalChars: text.length, charIndex: opts.baseChar || 0,
      playing: true, paused: false,
    };
    emit();
    medianSpeakNext();
  }
  async function medianSpeakNext() {
    if (!medianSession || medianSession.cancelled) return;
    const s = medianSession;
    if (s.idx >= s.chunks.length) { finishMedian(); return; }
    const text = s.chunks[s.idx];
    try {
      await medianTts.speak({ text, lang: s.lang, rate: s.rate, pitch: s.pitch });
    } catch (_) {}
    if (!medianSession || medianSession.cancelled) return;
    // Time-based completion estimate (~5 chars/sec at 1.0× Chinese)
    const estMs = Math.max(800, (text.length / (5 * s.rate)) * 1000 + 200);
    if (medianTimer) clearTimeout(medianTimer);
    medianTimer = setTimeout(() => {
      if (!medianSession || medianSession.cancelled) return;
      const startOfNext = chunkOffset(s.chunks, s.idx + 1);
      state = { ...state, charIndex: (s.opts.baseChar || 0) + startOfNext };
      emit();
      s.idx++;
      medianSpeakNext();
    }, estMs);
  }
  async function medianPause() {
    if (!medianSession) return;
    try { await medianTts.stop(); } catch (_) {}
    if (medianTimer) { clearTimeout(medianTimer); medianTimer = null; }
    state = { ...state, playing: false, paused: true };
    emit();
  }
  async function medianResume() {
    if (!medianSession || !state.paused) return;
    state = { ...state, playing: true, paused: false };
    emit();
    medianSpeakNext();
  }
  async function medianStop() {
    if (medianSession) medianSession.cancelled = true;
    medianSession = null;
    if (medianTimer) { clearTimeout(medianTimer); medianTimer = null; }
    try { if (medianTts) await medianTts.stop(); } catch (_) {}
    state = { ...state, playing: false, paused: false };
    emit();
  }
  function finishMedian() {
    medianSession = null;
    state = { ...state, playing: false, paused: false };
    emit();
  }

  function setRate(r) {
    state = { ...state, rate: clampRate(r) };
    emit();
    // Applies on the next chunk boundary automatically.
    if (session) session.rate = state.rate;
  }
  function clampRate(r) { return Math.min(3.0, Math.max(0.5, Number(r) || 1.0)); }

  function voices() { return synth ? synth.getVoices() : []; }
  function onState(fn) { listeners.add(fn); fn(state); return () => listeners.delete(fn); }
  function ready() { return state.ready ? Promise.resolve(voices()) : readyP; }

  window.HpmTts = {
    unsupported: false,
    native: NATIVE,
    median: MEDIAN,
    engine: NATIVE ? "capacitor" : (MEDIAN ? "median" : "web"),
    speak, pause, resume, stop, setRate,
    voices, onState, ready,
    detectLang, pickVoice,
    get state() { return state; },
  };
})();
</script>

const BookCover = ({ title, palette = "amber", size = 60, radius = 10, fontSize }) => {
  const palettes = {
    amber: { bg: "linear-gradient(135deg,#C8761E,#A85F12)", fg: "#F6F1E7" },
    teal:  { bg: "linear-gradient(135deg,#3C7A82,#2C5C62)", fg: "#F6F1E7" },
    ink:   { bg: "linear-gradient(135deg,#1C1812,#0E0C09)", fg: "#F6F1E7" },
    paper: { bg: "linear-gradient(135deg,#EFE8D8,#D4C7A8)", fg: "#1C1812" },
  };

  return (
    <div style={{
      width: size, height: size * 4/3, borderRadius: radius,
      background: p.bg, color: p.fg,
      display: "flex", alignItems: "flex-end", padding: size * 0.18,
      fontFamily: "'Source Serif 4', 'Noto Serif SC', serif",
      fontWeight: 600, fontSize: fontSize || size * 0.28, lineHeight: 1.1,
      letterSpacing: "-0.01em", flex: "none", boxSizing: "border-box",
      overflow: "hidden",
    }}>
      {title}
    </div>
  );
};

// ---------- Waveform (animates when playing) ----------
const Waveform = ({ playing, color = "#C8761E", size = 18, bars = 7 }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 2, height: size }}>
    {Array.from({ length: bars }).map((_, i) => (
      <div key={i} style={{
        width: 2, background: color, borderRadius: 1,
        height: `${30 + ((i * 37) % 70)}%`,
        animation: playing ? `hpmWave ${600 + i * 70}ms ease-in-out ${i * 50}ms infinite alternate` : "none",
        transformOrigin: "center",
      }} />
    ))}
    <style>{`
      @keyframes hpmWave {
        from { transform: scaleY(.4); }
        to   { transform: scaleY(1.1); }
      }
    `}</style>
  </div>
);

// ---------- Top app bar ----------
const AppBar = ({ title, left, right, subtitle, titleStyle }) => (
  <div style={{
    display: "flex", alignItems: "center", gap: 12,
    padding: "14px 16px 10px",
    background: "var(--bg)",
  }}>
    <div style={{ width: 40, display: "flex", justifyContent: "flex-start" }}>{left}</div>
    <div style={{ flex: 1, textAlign: "center", minWidth: 0 }}>
      <div style={{
        fontFamily: "var(--font-serif)", fontSize: 17, fontWeight: 700,
        color: "var(--fg)", lineHeight: 1.1,
        whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
        ...(titleStyle || {}),
      }}>{title}</div>
      {subtitle && (
        <div style={{
          fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-muted)",
          marginTop: 2,
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
        }}>{subtitle}</div>
      )}
    </div>
    <div style={{ width: 40, display: "flex", justifyContent: "flex-end" }}>{right}</div>
  </div>
);

// ---------- Round icon button (header) ----------
const IconButton = ({ icon, onClick, active, size = 40 }) => (
  <button onClick={onClick} style={{
    width: size, height: size, borderRadius: 999,
    border: 0, background: active ? "var(--accent-soft)" : "transparent",
    color: active ? "var(--accent-strong)" : "var(--fg)",
    display: "flex", alignItems: "center", justifyContent: "center",
    cursor: "pointer", transition: "background 120ms",
  }}>
    <Icon name={icon} size={20} />
  </button>
);

// ---------- Floating playback bar (over content) ----------
const PlaybackBar = ({ playing, book, onToggle, onOpen }) => {
  if (!book) return null;
  return (
    <div onClick={onOpen} style={{
      position: "absolute", left: 12, right: 12, bottom: 18,
      height: 64, borderRadius: 999, padding: "0 8px 0 8px",
      display: "flex", alignItems: "center", gap: 10,
      background: "color-mix(in oklab, var(--bg-elev) 92%, transparent)",
      backdropFilter: "blur(12px)",
      WebkitBackdropFilter: "blur(12px)",
      boxShadow: "0 4px 16px rgba(28,24,18,.10), 0 12px 32px rgba(28,24,18,.12)",
      cursor: "pointer",
      zIndex: 5,
    }}>
      <BookCover title={book.title[0]} palette={book.palette} size={48} radius={10} fontSize={18} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontFamily: "var(--font-serif)", fontSize: 14, fontWeight: 600, color: "var(--fg)",
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
        }}>{book.title}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Waveform playing={playing} size={14} bars={5} />
          <span style={{
            fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-muted)",
          }}>{book.chapter}</span>
        </div>
      </div>
      <button onClick={(e) => { e.stopPropagation(); onToggle(); }} style={{
        width: 44, height: 44, borderRadius: 999, border: 0,
        background: "var(--accent)", color: "#F6F1E7",
        display: "flex", alignItems: "center", justifyContent: "center",
        cursor: "pointer",
      }}>
        <Icon name={playing ? "pause" : "play"} size={20} color="#F6F1E7" />
      </button>
    </div>
  );
};

Object.assign(window, { Icon, BookCover, Waveform, AppBar, IconButton, PlaybackBar });
</script>

// ============================================================================
// NowPlayingScreen — chapter-paginated, free-scroll + auto-follow, edit + export
// ============================================================================
const NowPlayingScreen = ({
  book, textLoading, playing, paused, onToggle, onSeek, onBack, onOpenVoices, onSave, onExport,
  speedNum, setSpeedNum, charIndex, ttsUnsupported,
  chapters, currentChapterIdx, currentChapter, onJumpChapter,
  voiceLabel, onOpenToc, parsingChapters,
}) => {
  const text = book.text || "";
  const hasText = text.length > 0;
  const totalLen = text.length;

  // Pagination: viewIdx = the chapter the user is currently READING (may differ
  // from currentChapterIdx, the chapter being SPOKEN). When the user opens TOC
  // or jumps, we set viewIdx; otherwise viewIdx follows playback.
  const [viewIdx, setViewIdx] = React.useState(currentChapterIdx);
  const [followPlayback, setFollowPlayback] = React.useState(true);
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState("");

  React.useEffect(() => {
    if (followPlayback) setViewIdx(currentChapterIdx);
  }, [currentChapterIdx, followPlayback]);

  // Chapter slice — chunk of the full text the reader actually renders
  const sliceStart = chapters[viewIdx] ? chapters[viewIdx].charStart : 0;
  const sliceEnd   = window.HpmChapters
    ? window.HpmChapters.chapterEnd(chapters, viewIdx, totalLen)
    : totalLen;
  const slice = text.slice(sliceStart, sliceEnd);

  // Split slice into paragraphs; each carries its absolute charStart so we can
  // tap to seek and highlight the active one.
  const paragraphs = React.useMemo(() => {
    const out = [];
    let pos = sliceStart;
    const lines = slice.split("\n");
    for (const line of lines) {
      out.push({ text: line, charStart: pos, charEnd: pos + line.length,
                 isHeading: window.HpmChapters && window.HpmChapters.isHeading(line) });
      pos += line.length + 1;
    }
    return out;
  }, [slice, sliceStart]);

  const activeIdx = React.useMemo(() => {
    if (charIndex < sliceStart || charIndex >= sliceEnd) return -1;
    let lo = 0, hi = paragraphs.length - 1, ans = 0;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (paragraphs[mid].charStart <= charIndex) { ans = mid; lo = mid + 1; }
      else hi = mid - 1;
    }
    return ans;
  }, [paragraphs, charIndex, sliceStart, sliceEnd]);

  // Refs for auto-scroll behavior
  const scrollRef = React.useRef(null);
  const activeRef = React.useRef(null);
  const lastUserScrollAt = React.useRef(0);
  const [showFollowFab, setShowFollowFab] = React.useState(false);

  // Auto-scroll only when followPlayback is true AND the user hasn't scrolled
  // recently. Otherwise show the "回到朗读位置" FAB.
  React.useEffect(() => {
    if (!followPlayback) return;
    if (!activeRef.current || !scrollRef.current) return;
    if (Date.now() - lastUserScrollAt.current < 2200) return;   // user just scrolled
    const c = scrollRef.current, el = activeRef.current;
    const elTop = el.offsetTop;
    c.scrollTo({ top: Math.max(0, elTop - c.clientHeight * 0.35), behavior: "smooth" });
  }, [activeIdx, followPlayback, paragraphs.length]);

  // Watch user scroll → toggle follow + FAB
  const onScroll = () => {
    lastUserScrollAt.current = Date.now();
    if (followPlayback && activeRef.current && scrollRef.current) {
      // If active line is far off-screen, stop following.
      const c = scrollRef.current, el = activeRef.current;
      const r = el.getBoundingClientRect();
      const cr = c.getBoundingClientRect();
      if (r.bottom < cr.top - 40 || r.top > cr.bottom + 40) {
        setFollowPlayback(false);
        setShowFollowFab(true);
      }
    } else if (!followPlayback) {
      setShowFollowFab(true);
    }
  };

  const returnToPlaying = () => {
    setViewIdx(currentChapterIdx);
    setFollowPlayback(true);
    setShowFollowFab(false);
    requestAnimationFrame(() => {
      if (activeRef.current && scrollRef.current) {
        const c = scrollRef.current, el = activeRef.current;
        c.scrollTo({ top: Math.max(0, el.offsetTop - c.clientHeight * 0.35), behavior: "smooth" });
      }
    });
  };

  const goPrevChapter = () => {
    if (viewIdx <= 0) return;
    setFollowPlayback(false); setShowFollowFab(true);
    setViewIdx(viewIdx - 1);
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  };
  const goNextChapter = () => {
    if (viewIdx >= chapters.length - 1) return;
    setFollowPlayback(false); setShowFollowFab(true);
    setViewIdx(viewIdx + 1);
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  };

  const startEdit = () => { setDraft(text); setEditing(true); };
  const cancelEdit = () => setEditing(false);
  const saveEdit = () => { onSave(draft); setEditing(false); };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "var(--bg)" }}>
      <AppBar
        title={book.title}
        subtitle={editing ? "编辑中" : (currentChapter ? currentChapter.title : (book.chapter || "—"))}
        titleStyle={{ fontWeight: 700, color: "var(--fg)" }}
        left={<IconButton icon="back" onClick={editing ? cancelEdit : onBack} />}
        right={
          editing
            ? (
              <div style={{ display: "flex", gap: 4 }}>
                <button onClick={saveEdit} style={{
                  height: 32, padding: "0 12px", borderRadius: 999, border: 0,
                  background: "var(--gold-grad)", color: "#14110D",
                  fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 700,
                  cursor: "pointer",
                }}>保存</button>
              </div>
            )
            : (
              <button onClick={onOpenToc} style={{
                width: 40, height: 40, borderRadius: 999, border: 0, background: "transparent",
                color: "var(--fg)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <Icon name="menu" size={20} />
              </button>
            )
        }
      />

      {/* Chapter navigation strip */}
      {!editing && chapters.length > 1 && (
        <div style={{
          padding: "6px 18px 4px", display: "flex", alignItems: "center", gap: 10,
          flex: "none",
        }}>
          <button onClick={goPrevChapter} disabled={viewIdx <= 0} style={{
            width: 28, height: 28, borderRadius: 999, border: 0,
            background: "var(--bg-elev)", color: "var(--fg)",
            display: "flex", alignItems: "center", justifyContent: "center",
            opacity: viewIdx <= 0 ? .35 : 1, cursor: viewIdx <= 0 ? "default" : "pointer",
          }}><Icon name="chevron" size={14} color="var(--fg)" /></button>
          <button onClick={onOpenToc} style={{
            flex: 1, height: 28, padding: "0 12px", borderRadius: 999, border: "1px solid var(--rule)",
            background: "var(--bg-elev)", color: "var(--fg)",
            fontFamily: "var(--font-serif)", fontSize: 12, fontWeight: 600,
            cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
            minWidth: 0,
          }}>
            <Icon name="menu" size={12} color="var(--gold-strong)" />
            <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {chapters[viewIdx] ? chapters[viewIdx].title : "目录"}
            </span>
            <span style={{ color: "var(--fg-faint)", fontFamily: "var(--font-mono)", fontSize: 10 }}>
              {viewIdx + 1}/{chapters.length}
            </span>
          </button>
          <button onClick={goNextChapter} disabled={viewIdx >= chapters.length - 1} style={{
            width: 28, height: 28, borderRadius: 999, border: 0,
            background: "var(--bg-elev)", color: "var(--fg)",
            display: "flex", alignItems: "center", justifyContent: "center",
            transform: "rotate(180deg)",
            opacity: viewIdx >= chapters.length - 1 ? .35 : 1,
            cursor: viewIdx >= chapters.length - 1 ? "default" : "pointer",
          }}><Icon name="chevron" size={14} color="var(--fg)" /></button>
        </div>
      )}

      {/* Reader · scrollable */}
      {!editing && (
        <div ref={scrollRef} onScroll={onScroll} style={{
          flex: 1, overflowY: "auto", padding: "6px 22px 12px",
          WebkitOverflowScrolling: "touch", position: "relative",
        }}>
          {textLoading && (
            <div className="t-ui-sm" style={{ textAlign: "center", padding: 14, fontStyle: "italic" }}>
              加载书籍中…
            </div>
          )}
          {!textLoading && parsingChapters && chapters.length === 0 && (
            <div className="t-ui-sm" style={{ textAlign: "center", padding: 14, fontStyle: "italic" }}>
              正在解析章节…
            </div>
          )}
          {!textLoading && !hasText && (
            <div style={{ textAlign: "center", color: "var(--fg-faint)", fontStyle: "italic", paddingTop: 80, fontFamily: "var(--font-serif)" }}>
              (本书无文本 · 请从 + 重新上传 TXT)
            </div>
          )}
          <ParagraphList
            paragraphs={paragraphs}
            activeIdx={activeIdx}
            activeRef={activeRef}
            onSeek={onSeek}
          />
          <div style={{ height: 60 }} />
        </div>
      )}

      {/* Edit mode */}
      {editing && (
        <div style={{ flex: 1, padding: "8px 18px 12px", display: "flex", flexDirection: "column" }}>
          <div className="t-ui-sm" style={{ marginBottom: 6 }}>修改后点右上「保存」生效。仅修改本地副本，原文件不变。</div>
          <textarea
            value={draft}
            onChange={(e) => setDraft(e.target.value)}
            style={{
              flex: 1, width: "100%", padding: 14, borderRadius: 12,
              background: "var(--bg-elev)", border: "1px solid var(--rule)",
              color: "var(--fg)", fontFamily: "var(--font-serif)", fontSize: 15, lineHeight: 1.7,
              resize: "none", outline: "none",
            }}
          />
        </div>
      )}

      {/* Return-to-playing FAB */}
      {!editing && showFollowFab && hasText && (
        <button onClick={returnToPlaying} style={{
          position: "absolute", left: "50%", bottom: 116, transform: "translateX(-50%)",
          height: 36, padding: "0 16px", borderRadius: 999, border: 0,
          background: "var(--gold-grad)", color: "#14110D",
          fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 700,
          boxShadow: "0 8px 24px rgba(157,122,42,.35)", cursor: "pointer",
          display: "flex", alignItems: "center", gap: 6, zIndex: 6,
        }}>
          <Icon name="waveSm" size={14} color="#14110D" />
          回到朗读位置
        </button>
      )}

      {ttsUnsupported && (
        <div style={{
          margin: "0 22px 6px", padding: "8px 12px", borderRadius: 10,
          background: "var(--danger-soft)", color: "var(--danger)",
          fontSize: 12, fontWeight: 500, textAlign: "center",
        }}>当前浏览器不支持语音合成 · 请改用 Chrome / Edge / Safari</div>
      )}

      {/* Bottom dock */}
      <div style={{
        padding: "10px 16px 12px",
        background: "var(--bg)",
        borderTop: "1px solid var(--rule)",
        display: "flex", flexDirection: "column", gap: 8,
        flex: "none",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--fg-muted)", minWidth: 36, textAlign: "right" }}>
            {hasText ? `${Math.round((charIndex / Math.max(1, totalLen)) * 100)}%` : "—"}
          </span>
          <div style={{ flex: 1, height: 3, background: "var(--bg-sunken)", borderRadius: 99, overflow: "hidden" }}>
            <div style={{
              height: "100%",
              width: hasText ? `${(charIndex / Math.max(1, totalLen)) * 100}%` : "0%",
              background: "var(--gold-grad)",
              transition: "width 200ms linear",

          </div>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--fg-muted)", minWidth: 64, textAlign: "right" }}>
            {hasText ? `${charIndex.toLocaleString()}/${totalLen.toLocaleString()}` : "—"}
          </span>
        </div>

        {/* Speed slider · 0.5×–3.0× in 0.1 steps */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "0 2px" }}>
          <span className="t-ui-sm" style={{ fontFamily: "var(--font-mono)", minWidth: 30, color: "var(--fg-muted)" }}>速度</span>

          <input type="range" min="0.5" max="3.0" step="0.1"

          <span style={{

            color: "var(--gold-strong)", minWidth: 38, textAlign: "right",
          }}>{(speedNum || 1).toFixed(1)}×</span>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>

          {/* Edit / Export menu */}
          {!editing ? (
            <button onClick={startEdit} title="编辑文本" style={iconChipStyle}>
              <Icon name="edit" size={14} />
            </button>
          ) : null}
          <button onClick={() => onExport(book)} title="导出 TXT" style={iconChipStyle}>
            <Icon name="download" size={14} />
          </button>

          {/* Transport */}
          <div style={{ flex: 1, display: "flex", justifyContent: "center", alignItems: "center", gap: 8 }}>
            <button onClick={() => onSeek(Math.max(0, charIndex - 300))} style={transportBtnStyle}>
              <Icon name="prev" size={20} />
            </button>
            <button onClick={onToggle} disabled={ttsUnsupported || !hasText} style={{
              ...playBtnStyle,
              cursor: (ttsUnsupported || !hasText) ? "not-allowed" : "pointer",
              opacity: (ttsUnsupported || !hasText) ? 0.4 : 1,
            }}>
              <Icon name={playing ? "pause" : "play"} size={22} color="#14110D" />
            </button>
            <button onClick={() => onSeek(Math.min(totalLen, charIndex + 300))} style={transportBtnStyle}>
              <Icon name="next" size={20} />
            </button>
          </div>

          {/* Voice */}
          <button onClick={onOpenVoices} style={{
            height: 32, padding: "0 10px", borderRadius: 999, border: "1px solid var(--gold)",
            background: "var(--gold-soft)", color: "var(--gold-strong)",
            fontFamily: "var(--font-sans)", fontSize: 11, fontWeight: 700,
            display: "flex", alignItems: "center", gap: 6, cursor: "pointer",
            maxWidth: 96,

            <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", minWidth: 0 }}>{voiceLabel || "音色"}</span>
          </button>
        </div>
      </div>
    </div>
  );
};

  width: 28, height: 28, borderRadius: 999, border: "1px solid var(--rule)",

};

// Virtualized paragraph list — renders only what's visible (huge chapters OK)
const ParagraphList = ({ paragraphs, activeIdx, activeRef, onSeek }) => {
  // Estimate average paragraph height; tune empirically.
  const ROW_EST = 56;
  const [winTop, setWinTop] = React.useState(0);
  const [winH, setWinH] = React.useState(800);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current && ref.current.parentElement;
    if (!el) return;
    const update = () => {
      setWinTop(el.scrollTop);
      setWinH(el.clientHeight);
    };
    update();
    el.addEventListener("scroll", update, { passive: true });
    return () => el.removeEventListener("scroll", update);
  }, [paragraphs.length]);

  // If list is small, render all (cheaper than virtualization overhead)
  if (paragraphs.length <= 200) {
    return (
      <div ref={ref}>
        {paragraphs.map((p, i) => (
          <Paragraph key={i} p={p} active={i === activeIdx}
                     activeRef={i === activeIdx ? activeRef : null}
                     onSeek={onSeek} />
        ))}
      </div>
    );
  }

  // Virtualization: estimated positions; the active row gets a hard ref
  const buffer = 8;
  const startIdx = Math.max(0, Math.floor(winTop / ROW_EST) - buffer);
  const endIdx   = Math.min(paragraphs.length, Math.ceil((winTop + winH) / ROW_EST) + buffer);
  const totalH = paragraphs.length * ROW_EST;

  return (
    <div ref={ref} style={{ position: "relative", height: totalH }}>
      {paragraphs.slice(startIdx, endIdx).map((p, j) => {
        const i = startIdx + j;
        return (
          <div key={i} style={{
            position: "absolute", left: 0, right: 0,
            top: i * ROW_EST, minHeight: ROW_EST,
          }}>
            <Paragraph p={p} active={i === activeIdx}
                       activeRef={i === activeIdx ? activeRef : null}
                       onSeek={onSeek} />
          </div>
        );
      })}
    </div>
  );
};

const Paragraph = ({ p, active, activeRef, onSeek }) => {
  const heading = p.isHeading;
  return (
    <div
      ref={activeRef || null}
      onClick={() => onSeek(p.charStart)}
      style={{
        margin: heading ? "18px -8px 12px" : "0 -8px 10px",
        padding: active ? "6px 10px" : "0 10px",
        borderRadius: active ? 8 : 0,
        background: active ? "var(--accent-soft)" : "transparent",
        fontFamily: "var(--font-serif)",
        fontSize: heading ? 18 : 16,
        fontWeight: heading ? 700 : 400,
        lineHeight: 1.85,
        color: heading
          ? "var(--gold-strong)"
          : (active ? "var(--accent-strong)" : "var(--fg)"),
        cursor: "pointer",
        transition: "background 180ms ease, color 180ms ease",
        textAlign: heading ? "center" : "left",
        letterSpacing: heading ? ".06em" : 0,
        whiteSpace: "pre-wrap", wordBreak: "break-word",
      }}
    >{p.text || "\u00A0"}</div>
  );
};

// ============================================================================
// AddFileSheet — drag-or-tap to upload, multi-encoding decode
// ============================================================================
const AddFileSheet = ({ onClose, onAdd }) => {
  const inputRef = React.useRef(null);
  const [tab, setTab] = React.useState("local");
  const [reading, setReading] = React.useState(false);
  const [error,   setError]   = React.useState(null);
  const [progress, setProgress] = React.useState(null);
  const [dragOver, setDragOver] = React.useState(false);
  const [urlInput, setUrlInput] = React.useState("");
  const [urlHistory, setUrlHistory] = React.useState(() =>
    (window.HpmStore && window.HpmStore.get("urlHistory", [])) || []);

  const formatSize = (n) =>
    (window.HpmReadTextFile && window.HpmReadTextFile.formatSize)
      ? window.HpmReadTextFile.formatSize(n)
      : ((n / 1024 / 1024).toFixed(1) + " MB");

  const handleFiles = async (fileList) => {
    if (!fileList || !fileList.length) return;
    setReading(true); setError(null); setProgress(null);
    try {
      for (const file of Array.from(fileList)) {
        if (!/\.txt$/i.test(file.name) && file.type && !file.type.startsWith("text/")) {
          setError(`仅支持 TXT · ${file.name}`); continue;
        }
        if (!window.HpmReadTextFile) { setError("读取器未初始化"); continue; }
        setProgress({ name: file.name, stage: "读取中" });
        const r = await window.HpmReadTextFile(file);
        if (r && r.ok) {
          setProgress({ name: file.name, stage: "添加中" });
          try {
            await Promise.resolve(onAdd({
              name: file.name,
              size: formatSize(r.byteCount),
              text: r.text,
              charset: r.charset,
            }));
          } catch (e) { setError("加入书架失败 · " + (e && e.message || e)); }
        } else if (r && r.reason === "too-large") {
          setError(`文件过大 · ${formatSize(r.byteCount || 0)} · 上限 64 MB`);
        } else if (r && r.reason === "empty") setError("文件为空");
        else setError("无法读取文件 · " + ((r && r.error) || "未知错误"));
      }
    } catch (e) {
      setError("读取失败 · " + (e && e.message || e));
    } finally {
      setReading(false); setProgress(null);
    }
  };

  const handleUrl = async (rawUrl) => {
    const url = (rawUrl || urlInput || "").trim();
    if (!url) { setError("请输入网址"); return; }
    if (!window.HpmFetchUrl) { setError("URL 加载器未初始化"); return; }
    setReading(true); setError(null);
    setProgress({ name: url.length > 50 ? url.slice(0, 50) + "…" : url, stage: "下载中" });
    const r = await window.HpmFetchUrl(url);
    setReading(false); setProgress(null);
    if (r && r.ok) {
      try {
        await Promise.resolve(onAdd({ name: r.name || "remote.txt",
                size: formatSize(r.byteCount),
                text: r.text, charset: r.charset }));
      } catch (e) { setError("加入书架失败 · " + (e && e.message || e)); return; }
      const next = [url, ...urlHistory.filter(u => u !== url)].slice(0, 8);
      setUrlHistory(next);
      if (window.HpmStore) window.HpmStore.set("urlHistory", next);
    } else if (r && r.reason === "too-large") {
      setError(`文件过大 · ${formatSize(r.byteCount || 0)} · 上限 64 MB`);
    } else if (r && r.reason === "cors") {
      setError("无法访问该网址 · 跨域被拦截或网址不公开");
    } else {
      setError("加载失败 · " + (r.error || r.reason));
    }
  };

  const Tab = ({ id, label }) => (
    <button onClick={() => { setTab(id); setError(null); }} style={{
      flex: 1, height: 36, borderRadius: 8, border: 0,
      background: tab === id ? "var(--gold-grad)" : "transparent",
      color: tab === id ? "#14110D" : "var(--fg-muted)",
      fontFamily: "var(--font-sans)", fontSize: 13, fontWeight: 700,
      cursor: "pointer",
    }}>{label}</button>
  );

  return (
    <div style={{
      position: "absolute", inset: 0, zIndex: 10,
      background: "var(--scrim)",
      display: "flex", alignItems: "flex-end",
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: "100%", background: "var(--bg-elev)",
        borderTopLeftRadius: 28, borderTopRightRadius: 28,
        padding: "12px 18px 24px",
        boxShadow: "0 -12px 32px rgba(28,24,18,.20)",
        maxHeight: "85%", overflowY: "auto",
      }}>
        <div style={{ width: 36, height: 4, borderRadius: 99, background: "var(--rule-strong)", margin: "0 auto 14px" }} />
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div className="gold-bold" style={{ fontSize: 22 }}>添加 TXT</div>
          <IconButton icon="close" onClick={onClose} />
        </div>

        {/* Tabs */}
        <div style={{
          display: "flex", padding: 3, marginBottom: 12,
          background: "var(--bg-sunken)", borderRadius: 10,
        }}>
          <Tab id="local" label="本地文件" />
          <Tab id="url"   label="从网址加载" />
        </div>

        {tab === "local" && (
          <React.Fragment>
            <div className="t-ui-sm" style={{ marginBottom: 12 }}>
              自动识别编码 · UTF-8 / GBK / GB18030 / BIG5 / UTF-16。上限 64 MB。
            </div>
            <input ref={inputRef} type="file" accept=".txt,text/plain" multiple
              style={{ display: "none" }}
              onChange={(e) => handleFiles(e.target.files)} />
            <div
              onClick={() => inputRef.current && inputRef.current.click()}
              onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
              style={{
                border: `1.5px dashed ${dragOver ? "var(--gold)" : "var(--rule-strong)"}`,
                background: dragOver ? "var(--gold-soft)" : "var(--bg)",
                borderRadius: 16, padding: "22px 16px", textAlign: "center",
                cursor: "pointer", transition: "all 120ms ease",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 10,
              }}>
              <div style={{
                width: 44, height: 44, borderRadius: 12,
                background: "var(--gold-grad)", color: "#14110D",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <Icon name="txt" size={22} color="#14110D" />
              </div>
              <div style={{ fontFamily: "var(--font-sans)", fontSize: 14, fontWeight: 700, color: "var(--fg)" }}>
                {reading ? (progress ? `${progress.stage} · ${progress.name}` : "读取中…") : "选择本地 TXT 文件"}
              </div>
              <div className="t-ui-sm" style={{ fontFamily: "var(--font-mono)" }}>点按选择 · 或拖拽到此</div>
            </div>
          </React.Fragment>
        )}

        {tab === "url" && (
          <React.Fragment>
            <div className="t-ui-sm" style={{ marginBottom: 10 }}>
              支持：GitHub Raw · GitHub Gist · jsDelivr · Dropbox 公开链接 · 任何允许跨域的直链 TXT 网址。
              <br/>不支持：百度网盘、微信文件助手（这些平台禁止外链）。
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <input
                type="url" inputMode="url" placeholder="https://..."
                value={urlInput}
                onChange={(e) => setUrlInput(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") handleUrl(); }}
                style={{
                  flex: 1, height: 44, padding: "0 14px", borderRadius: 10,
                  border: "1px solid var(--rule)", background: "var(--bg)",
                  color: "var(--fg)", fontFamily: "var(--font-mono)", fontSize: 13,
                  outline: "none",
                }} />
              <button onClick={() => handleUrl()} disabled={reading} style={{
                height: 44, padding: "0 18px", borderRadius: 10, border: 0,
                background: "var(--gold-grad)", color: "#14110D",
                fontFamily: "var(--font-sans)", fontSize: 14, fontWeight: 700,
                cursor: reading ? "wait" : "pointer", opacity: reading ? .5 : 1,
              }}>{reading ? "加载中…" : "加载"}</button>
            </div>

            {progress && (
              <div className="t-ui-sm" style={{ marginBottom: 10, fontFamily: "var(--font-mono)" }}>
                {progress.stage} · {progress.name}
              </div>
            )}

            {urlHistory.length > 0 && (
              <div style={{ marginTop: 8 }}>
                <div style={{
                  fontFamily: "var(--font-sans)", fontSize: 10, color: "var(--gold-strong)",
                  textTransform: "uppercase", letterSpacing: ".22em", fontWeight: 700,
                  padding: "4px 2px 6px",
                }}>最近访问</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {urlHistory.map((u, i) => (
                    <button key={i} onClick={() => { setUrlInput(u); handleUrl(u); }} style={{
                      display: "flex", alignItems: "center", gap: 10,
                      padding: "10px 12px", border: "1px solid var(--rule)",
                      borderRadius: 10, background: "var(--bg)", cursor: "pointer",
                      textAlign: "left",
                    }}>
                      <Icon name="download" size={14} color="var(--gold-strong)" />
                      <span style={{
                        flex: 1, minWidth: 0,
                        fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg)",
                        overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                      }}>{u}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </React.Fragment>
        )}

        {error && (
          <div style={{
            marginTop: 10, padding: "10px 12px", borderRadius: 10,
            background: "var(--danger-soft)", color: "var(--danger)",
            fontFamily: "var(--font-sans)", fontSize: 13, fontWeight: 500,
          }}>{error}</div>
        )}
      </div>
    </div>
  );
};
